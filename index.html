<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Escolha</title>
    <link rel="shortcut icon" href="favicon.webp" type="image/webp">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h2 id="title">Escolha o CAMINHO POKÉMON!</h2>
        <img id="scene-img" src="caminho.png" alt="Cena do Jogo">
        <p id="story">Você está caminhando e se depara com dois caminhos. Qual caminho você vai seguir?</p>
        <button class="choice" onclick="escolha('alegre')">Caminho Alegre</button>
        <button class="choice" onclick="escolha('assustador')">Caminho Assustador</button>
    </div>
    <script src="main.js"></script>
</body>
</html>
